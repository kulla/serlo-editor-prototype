name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
        with:
          install: 'false'
      - run: bun audit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
      - run: bun run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
      - run: |
          bun run dev >/tmp/dev.log 2>&1 &
          dev_pid=$!
          trap 'kill $dev_pid' EXIT

          for _ in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              break
            fi
            sleep 1
          done

          bun test:e2e

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
      - run: bun run check:format

  tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
      - run: bun run check:tsc
